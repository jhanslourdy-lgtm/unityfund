<!DOCTYPE html><html lang="fr" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Catégories - UnityFund Admin</title><link rel="stylesheet" th:href="@{/css/admin-pro.css}" href="/css/admin-pro.css"></head><body class="admin-body"><div class="mobile-overlay" data-admin-overlay></div><div class="admin-shell"><aside class="admin-sidebar">
  <div class="admin-brand"><span class="admin-logo"></span><span>UnityFund Admin</span></div>
  <nav class="admin-nav">
    <a href="/admin/dashboard">Dashboard</a><a href="/admin/users">Utilisateurs</a><a href="/admin/campaigns">Campagnes</a><a href="/admin/donations">Dons</a><a href="/admin/categories">Catégories</a><a href="/admin/withdrawals">Retraits</a><a href="/admin/reports">Signalements</a><a href="/admin/audit-logs">Audit logs</a><a href="/home">Retour au site</a>
  </nav>
</aside><main class="admin-main"><header class="admin-topbar"><button class="hamburger" type="button" data-admin-menu-toggle>☰</button><div class="admin-title"><h1>Catégories</h1><p>Organisation des campagnes</p></div><div class="page-actions"><a class="btn btn-soft smart-back" href="#" data-fallback="/admin/dashboard">← Retour</a></div></header><section class="admin-content"><div class="admin-card"><div class="admin-card-header"><h2>Ajouter une catégorie</h2></div><form class="admin-form" th:action="@{/admin/categories/save}" method="post"><input name="name" placeholder="Nom de la catégorie" required><input name="description" placeholder="Description"><button class="btn btn-primary" type="submit">Enregistrer</button></form></div><div class="admin-card"><div class="admin-card-header"><h2>Catégories</h2></div><div class="table-wrap"><table class="admin-table"><thead><tr><th>ID</th><th>Nom</th><th>Description</th></tr></thead><tbody><tr th:each="c:${categories}"><td th:text="${c.id}">1</td><td th:text="${c.name}">Nom</td><td th:text="${c.description}">Description</td></tr><tr th:if="${#lists.isEmpty(categories)}"><td colspan="3" class="empty-state">Aucune catégorie.</td></tr></tbody></table></div></div></section></main></div><script th:src="@{/js/admin-pro.js}" src="/js/admin-pro.js"></script></body></html>
