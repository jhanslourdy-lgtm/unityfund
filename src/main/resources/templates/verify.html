<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Vérification | UnityFund</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@400&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#10b77f",
                        "background-light": "#f6f8f7",
                        "background-dark": "#10221c",
                    },
                    fontFamily: { "display": ["Inter", "sans-serif"] },
                },
            },
        }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-[440px]">
        <div class="flex flex-col items-center mb-8">
            <div class="bg-primary/10 p-3 rounded-xl mb-4">
                <svg class="size-8 text-primary" fill="none" viewBox="0 0 48 48">
                    <path d="M8 36V12l14 10 14-10v24H8z" fill="currentColor"/>
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-slate-900 dark:text-slate-100">Vérifiez votre email</h1>
            <p class="text-slate-500 dark:text-slate-400 text-sm mt-2 text-center">
                Un code à 6 chiffres a été envoyé à<br/>
                <span class="font-semibold text-slate-700 dark:text-slate-300" th:text="${email}">email@example.com</span>
            </p>
        </div>

        <div class="bg-white dark:bg-slate-900 shadow-xl shadow-primary/5 rounded-xl border border-slate-100 dark:border-slate-800 p-8">
            <div th:if="${error}" class="mb-4 p-3 bg-red-100 border border-red-400 text-red-700 rounded-lg text-sm" th:text="${error}"></div>

            <form th:action="@{/verify}" method="POST" class="space-y-5">
                <input type="hidden" name="email" th:value="${email}"/>
                <div>
                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1.5">Code de vérification</label>
                    <input type="text" name="code" maxlength="6" required inputmode="numeric" pattern="[0-9]{6}"
                           class="w-full px-4 py-3 text-center text-2xl tracking-[0.5em] bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none" 
                           placeholder="000000"/>
                </div>
                <button type="submit" class="w-full py-3 bg-primary hover:bg-primary/90 text-white font-bold rounded-lg transition-all shadow-lg shadow-primary/20">
                    Vérifier mon compte
                </button>
            </form>

            <div class="mt-6 text-center">
                <p class="text-sm text-slate-500 dark:text-slate-400">
                    Vous n'avez pas reçu le code ?
                    <a th:href="@{/register}" class="text-primary font-bold hover:underline">Réessayer l'inscription</a>
                </p>
            </div>
        </div>
    </div>
</body>
</html>
