<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Nouveau mot de passe | UnityFund</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@400&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#10b77f",
                        "background-light": "#f6f8f7",
                        "background-dark": "#10221c",
                    },
                    fontFamily: { "display": ["Inter", "sans-serif"] },
                },
            },
        }
    </script>
    <link rel="stylesheet" th:href="@{/css/ux-global.css}" href="/css/ux-global.css">
</head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-[440px]">
        
        <div class="flex flex-col items-center mb-8">
            <div class="bg-primary/10 p-3 rounded-xl mb-4">
                <span class="material-symbols-outlined text-3xl text-primary">lock_reset</span>
            </div>
            <h1 class="text-2xl font-bold text-slate-900 dark:text-slate-100">Nouveau mot de passe</h1>
            <p class="text-slate-500 dark:text-slate-400 text-sm mt-2 text-center" th:if="${email != null}">
                Pour <span class="font-semibold text-slate-700 dark:text-slate-300" th:text="${email}">email</span>
            </p>
        </div>

        <div class="bg-white dark:bg-slate-900 shadow-xl shadow-primary/5 rounded-xl border border-slate-100 dark:border-slate-800 p-8">
            
            <!-- Erreur token invalide -->
            <div th:if="${invalidToken}" class="text-center py-4">
                <div class="w-16 h-16 mx-auto mb-4 rounded-full bg-red-100 flex items-center justify-center">
                    <span class="material-symbols-outlined text-3xl text-red-500">error</span>
                </div>
                <h3 class="text-lg font-bold text-red-600 mb-2">Lien invalide</h3>
                <p class="text-slate-500 text-sm mb-6" th:text="${error}">Ce lien a expiré.</p>
                <a th:href="@{/forgot-password}" class="inline-block w-full py-3 bg-primary hover:bg-primary/90 text-white font-bold rounded-lg transition-all">
                    Faire une nouvelle demande
                </a>
            </div>

            <!-- Formulaire -->
            <form th:unless="${invalidToken}" th:action="@{/reset-password}" method="POST" class="space-y-5">
                <div th:if="${error}" class="p-3 bg-red-100 border border-red-400 text-red-700 rounded-lg text-sm" th:text="${error}"></div>
                
                <input type="hidden" name="token" th:value="${token}"/>

                <div>
                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1.5">Nouveau mot de passe</label>
                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-[20px]">lock</span>
                        <input type="password" name="password" id="password" required minlength="6"
                               class="w-full pl-10 pr-10 py-3 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg text-slate-900 dark:text-slate-100 placeholder:text-slate-400 focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none" 
                               placeholder="••••••••"/>
                    </div>
                    <p class="text-xs text-slate-500 mt-1">Minimum 6 caractères</p>
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1.5">Confirmer le mot de passe</label>
                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-[20px]">lock</span>
                        <input type="password" name="confirmPassword" id="confirmPassword" required
                               class="w-full pl-10 pr-10 py-3 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg text-slate-900 dark:text-slate-100 placeholder:text-slate-400 focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none" 
                               placeholder="••••••••"/>
                    </div>
                    <p id="match-error" class="text-xs text-red-500 mt-1 hidden">Les mots de passe ne correspondent pas</p>
                </div>

                <button type="submit" id="submit-btn" class="w-full py-3 bg-primary hover:bg-primary/90 text-white font-bold rounded-lg transition-all shadow-lg shadow-primary/20">
                    Réinitialiser le mot de passe
                </button>
            </form>
        </div>
    </div>

    <script>
        // Validation côté client
        const password = document.getElementById('password');
        const confirm = document.getElementById('confirmPassword');
        const matchError = document.getElementById('match-error');
        const submitBtn = document.getElementById('submit-btn');

        function checkMatch() {
            if (confirm.value && password.value !== confirm.value) {
                matchError.classList.remove('hidden');
                submitBtn.disabled = true;
                submitBtn.classList.add('opacity-50', 'cursor-not-allowed');
            } else {
                matchError.classList.add('hidden');
                submitBtn.disabled = false;
                submitBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            }
        }

        if (password && confirm) {
            password.addEventListener('input', checkMatch);
            confirm.addEventListener('input', checkMatch);
        }
    </script>
<script th:src="@{/js/ux-global.js}" src="/js/ux-global.js"></script>
</body>
</html>
