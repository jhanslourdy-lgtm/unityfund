<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Don confirmé | UnityFund</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@400&display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#10b77f",
                        "background-light": "#f6f8f7",
                        "background-dark": "#10221c",
                    },
                    fontFamily: { display: ["Inter", "sans-serif"] },
                },
            },
        };
    </script>
    <link rel="stylesheet" th:href="@{/css/unityfund-ui-fixes.css}">
</head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md text-center">
        <div class="bg-white dark:bg-slate-900 rounded-2xl shadow-xl border border-slate-100 dark:border-slate-800 p-8">
            <div class="w-20 h-20 mx-auto mb-6 rounded-full bg-green-100 flex items-center justify-center">
                <span class="material-symbols-outlined text-4xl text-green-600">check_circle</span>
            </div>
            
            <h1 class="text-2xl font-bold text-slate-900 dark:text-white mb-2">Merci pour votre don !</h1>
            <p class="text-slate-500 mb-6">
                Votre soutien de <span class="font-bold text-primary" th:text="${payment != null ? payment.amount + ' $' : '0 $'}">0 $</span> 
                a bien été reçu.
            </p>
            
            <div class="bg-slate-50 dark:bg-slate-800 rounded-lg p-4 mb-6 text-left">
                <div class="flex justify-between text-sm mb-2">
                    <span class="text-slate-500">Transaction</span>
                    <span class="font-mono text-slate-700 dark:text-slate-300" th:text="${param.transactionId != null ? #strings.substring(param.transactionId[0], 0, 8) + '...' : 'N/A'}">ABC123...</span>
                </div>
                <div class="flex justify-between text-sm mb-2">
                    <span class="text-slate-500">Campagne</span>
                    <span class="font-medium text-slate-700 dark:text-slate-300" th:text="${campaign != null ? campaign.title : 'Chargement...'}">Titre</span>
                </div>
                <div class="flex justify-between text-sm">
                    <span class="text-slate-500">Date</span>
                    <span class="text-slate-700 dark:text-slate-300" th:text="${#dates.format(#dates.createNow(), 'dd/MM/yyyy HH:mm')}">01/01/2026</span>
                </div>
            </div>

            <div class="flex flex-col gap-3">
                <a th:href="@{/campaign/details/{id}(id=${campaign != null ? campaign.id : 0})}" class="w-full py-3 bg-primary hover:bg-primary/90 text-white font-bold rounded-lg transition-all">
                    Retour à la campagne
                </a>
                <a th:href="@{/explore}" class="w-full py-3 border border-slate-200 dark:border-slate-700 text-slate-700 dark:text-slate-200 font-bold rounded-lg hover:bg-slate-50 dark:hover:bg-slate-800 transition-all">
                    Explorer d'autres causes
                </a>
            </div>
        </div>
    </div>
</body>
</html>
