<!DOCTYPE html><html lang="fr" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Dons - UnityFund Admin</title><link rel="stylesheet" th:href="@{/css/admin-pro.css}" href="/css/admin-pro.css"></head><body class="admin-body"><div class="mobile-overlay" data-admin-overlay></div><div class="admin-shell"><aside class="admin-sidebar">
  <div class="admin-brand"><span class="admin-logo"></span><span>UnityFund Admin</span></div>
  <nav class="admin-nav">
    <a href="/admin/dashboard">Dashboard</a><a href="/admin/users">Utilisateurs</a><a href="/admin/campaigns">Campagnes</a><a href="/admin/donations">Dons</a><a href="/admin/categories">Catégories</a><a href="/admin/withdrawals">Retraits</a><a href="/admin/reports">Signalements</a><a href="/admin/audit-logs">Audit logs</a><a href="/home">Retour au site</a>
  </nav>
</aside><main class="admin-main"><header class="admin-topbar"><button class="hamburger" type="button" data-admin-menu-toggle>☰</button><div class="admin-title"><h1>Dons</h1><p>Suivi des contributions</p></div><div class="page-actions"><a class="btn btn-soft smart-back" href="#" data-fallback="/admin/dashboard">← Retour</a></div></header><section class="admin-content"><div class="admin-card"><div class="admin-card-header"><h2>Dons</h2></div><div class="table-wrap"><table class="admin-table"><thead><tr><th>ID</th><th>Montant</th><th>Campagne</th><th>Donateur</th><th>Message</th><th>Date</th></tr></thead><tbody><tr th:each="d : ${donations}"><td th:text="${d.id}">1</td><td th:text="${d.amount}">0</td><td th:text="${d.campaignTitle}">Campagne</td><td th:text="${d.donorEmail}">Donateur</td><td class="truncate" th:text="${d.message}">Message</td><td th:text="${d.createdAt}">Date</td></tr><tr th:if="${#lists.isEmpty(donations)}"><td colspan="6" class="empty-state">Aucun don.</td></tr></tbody></table></div></div></section></main></div><script th:src="@{/js/admin-pro.js}" src="/js/admin-pro.js"></script></body></html>
