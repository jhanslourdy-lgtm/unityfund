<!DOCTYPE html><html lang="fr" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Signalements - UnityFund Admin</title><link rel="stylesheet" th:href="@{/css/admin-pro.css}" href="/css/admin-pro.css"></head><body class="admin-body"><div class="mobile-overlay" data-admin-overlay></div><div class="admin-shell"><aside class="admin-sidebar">
  <div class="admin-brand"><span class="admin-logo"></span><span>UnityFund Admin</span></div>
  <nav class="admin-nav">
    <a href="/admin/dashboard">Dashboard</a><a href="/admin/users">Utilisateurs</a><a href="/admin/campaigns">Campagnes</a><a href="/admin/donations">Dons</a><a href="/admin/categories">Catégories</a><a href="/admin/withdrawals">Retraits</a><a href="/admin/reports">Signalements</a><a href="/admin/audit-logs">Audit logs</a><a href="/home">Retour au site</a>
  </nav>
</aside><main class="admin-main"><header class="admin-topbar"><button class="hamburger" type="button" data-admin-menu-toggle>☰</button><div class="admin-title"><h1>Signalements</h1><p>Modération des contenus signalés</p></div><div class="page-actions"><a class="btn btn-soft smart-back" href="#" data-fallback="/admin/dashboard">← Retour</a></div></header><section class="admin-content"><div class="admin-card"><div class="admin-card-header"><h2>Signalements</h2></div><div class="table-wrap"><table class="admin-table"><thead><tr><th>ID</th><th>Raison</th><th>Description</th><th>Statut</th><th>Action</th></tr></thead><tbody><tr th:each="r:${reports}"><td th:text="${r.id}">1</td><td th:text="${r.reason}">FRAUD</td><td class="truncate" th:text="${r.description}">Description</td><td><span class="badge" th:text="${r.status}">PENDING</span></td><td><form class="form-inline" th:action="@{/admin/reports/{id}/status(id=${r.id})}" method="post"><select name="status"><option value="PENDING">PENDING</option><option value="REVIEWED">REVIEWED</option><option value="RESOLVED">RESOLVED</option><option value="DISMISSED">DISMISSED</option></select><button class="btn btn-soft" type="submit">Mettre à jour</button></form></td></tr><tr th:if="${#lists.isEmpty(reports)}"><td colspan="5" class="empty-state">Aucun signalement.</td></tr></tbody></table></div></div></section></main></div><script th:src="@{/js/admin-pro.js}" src="/js/admin-pro.js"></script></body></html>
