<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Paramètres du profil | UnityFund</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@400&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#10b77f",
                        "background-light": "#f6f8f7",
                        "background-dark": "#10221c",
                    },
                    fontFamily: { "display": ["Inter", "sans-serif"] },
                },
            },
        }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark min-h-screen font-display text-slate-900 dark:text-slate-100">
    
    <div class="max-w-2xl mx-auto px-4 py-12">
        <div class="mb-8">
            <a th:href="@{/dashboard}" class="text-sm text-slate-500 hover:text-primary flex items-center gap-1 mb-4">
                <span class="material-symbols-outlined text-sm">arrow_back</span>
                Retour au dashboard
            </a>
            <h1 class="text-3xl font-bold">Paramètres du profil</h1>
            <p class="text-slate-500 mt-2">Personnalisez votre profil public pour rassurer vos donateurs.</p>
        </div>

        <div th:if="${success}" class="mb-6 p-4 bg-green-100 border border-green-400 text-green-700 rounded-lg" th:text="${success}"></div>
        <div th:if="${error}" class="mb-6 p-4 bg-red-100 border border-red-400 text-red-700 rounded-lg" th:text="${error}"></div>

        <form th:action="@{/profile/settings}" method="POST" enctype="multipart/form-data" class="bg-white dark:bg-slate-900 rounded-xl shadow-xl border border-slate-100 dark:border-slate-800 p-8 space-y-6">
            
            <!-- Photo de profil -->
            <div class="flex flex-col items-center gap-4">
                <div class="relative">
                    <div class="size-28 rounded-full bg-primary/10 flex items-center justify-center text-primary text-3xl font-bold overflow-hidden border-4 border-white dark:border-slate-800 shadow-lg">
                        <img th:if="${user.profileImageUrl != null}" th:src="${user.profileImageUrl}" class="w-full h-full object-cover" id="avatar-preview"/>
                        <span th:unless="${user.profileImageUrl != null}" th:text="${#strings.substring(user.firstName,0,1) + #strings.substring(user.lastName,0,1)}" id="avatar-initials">UN</span>
                    </div>
                    <label for="imageFile" class="absolute bottom-0 right-0 bg-primary text-white p-2 rounded-full cursor-pointer shadow-lg hover:bg-primary/90 transition-colors">
                        <span class="material-symbols-outlined text-sm">photo_camera</span>
                    </label>
                    <input type="file" id="imageFile" name="imageFile" accept="image/*" class="hidden" onchange="previewAvatar(event)"/>
                </div>
                <p class="text-xs text-slate-500">Cliquez sur l'icône pour changer votre photo</p>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5">Prénom</label>
                    <input type="text" th:value="${user.firstName}" disabled class="w-full px-4 py-3 rounded-lg border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 text-slate-500 cursor-not-allowed"/>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5">Nom</label>
                    <input type="text" th:value="${user.lastName}" disabled class="w-full px-4 py-3 rounded-lg border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 text-slate-500 cursor-not-allowed"/>
                </div>
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5">Bio</label>
                <textarea name="bio" rows="4" th:text="${user.bio}" class="w-full px-4 py-3 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 focus:ring-2 focus:ring-primary outline-none resize-none" placeholder="Parlez de vous, de votre mission..."></textarea>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5">Pays / Ville</label>
                    <input type="text" name="country" th:value="${user.country}" class="w-full px-4 py-3 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 focus:ring-2 focus:ring-primary outline-none" placeholder="Ex: Paris, France"/>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5">Téléphone</label>
                    <input type="tel" name="phone" th:value="${user.phone}" class="w-full px-4 py-3 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 focus:ring-2 focus:ring-primary outline-none" placeholder="+33 6 12 34 56 78"/>
                </div>
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5">Site web</label>
                <input type="url" name="website" th:value="${user.website}" class="w-full px-4 py-3 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 focus:ring-2 focus:ring-primary outline-none" placeholder="https://monsite.com"/>
            </div>

            <div class="pt-4">
                <button type="submit" class="w-full py-3 bg-primary hover:bg-primary/90 text-white font-bold rounded-lg transition-all shadow-lg shadow-primary/20">
                    Enregistrer les modifications
                </button>
            </div>
        </form>
    </div>

    <script>
        function previewAvatar(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    let img = document.getElementById('avatar-preview');
                    const initials = document.getElementById('avatar-initials');
                    if (!img) {
                        img = document.createElement('img');
                        img.id = 'avatar-preview';
                        img.className = 'w-full h-full object-cover';
                        initials.parentNode.insertBefore(img, initials);
                        initials.style.display = 'none';
                    }
                    img.src = e.target.result;
                    img.style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        }
    </script>
</body>
</html>
