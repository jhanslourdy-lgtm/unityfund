<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Mes retraits | UnityFund</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@400&display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#10b77f",
                        "background-light": "#f6f8f7",
                        "background-dark": "#10221c",
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark min-h-screen font-display text-slate-900 dark:text-slate-100">
    <div class="max-w-4xl mx-auto px-4 py-12">
        <div class="flex items-center justify-between mb-8">
            <div>
                <a th:href="@{/dashboard}" class="text-sm text-slate-500 hover:text-primary flex items-center gap-1 mb-2">
                    <span class="material-symbols-outlined text-sm">arrow_back</span>
                    Dashboard
                </a>
                <h1 class="text-3xl font-bold">Mes retraits</h1>
            </div>
            <a th:href="@{/withdrawals/request}" 
               th:classappend="${availableBalance < minAmount} ? 'opacity-50 cursor-not-allowed' : ''"
               class="bg-primary text-white px-6 py-3 rounded-lg font-bold hover:bg-primary/90 transition-all shadow-lg shadow-primary/20 flex items-center gap-2">
                <span class="material-symbols-outlined text-sm">payments</span>
                Nouveau retrait
            </a>
        </div>

        <!-- Solde -->
        <div class="bg-white dark:bg-slate-900 rounded-xl border border-slate-100 dark:border-slate-800 p-6 mb-8 flex items-center gap-6 shadow-sm">
            <div class="bg-primary/10 p-3 rounded-full">
                <span class="material-symbols-outlined text-3xl text-primary">account_balance_wallet</span>
            </div>
            <div>
                <p class="text-sm text-slate-500">Solde disponible</p>
                <p class="text-3xl font-black text-slate-900 dark:text-white" th:text="${#numbers.formatDecimal(availableBalance, 1, 2, 'WHITESPACE') + ' $'}">0.00 $</p>
            </div>
        </div>

        <div th:if="${success}" class="mb-6 p-4 bg-green-100 border border-green-400 text-green-700 rounded-lg" th:text="${success}"></div>
        <div th:if="${error}" class="mb-6 p-4 bg-red-100 border border-red-400 text-red-700 rounded-lg" th:text="${error}"></div>

        <!-- Liste -->
        <div class="bg-white dark:bg-slate-900 rounded-xl border border-slate-100 dark:border-slate-800 shadow-sm overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 dark:bg-slate-800/50 text-slate-500 text-xs uppercase tracking-wider">
                        <tr>
                            <th class="px-6 py-4 font-semibold">Date</th>
                            <th class="px-6 py-4 font-semibold">Montant</th>
                            <th class="px-6 py-4 font-semibold">Méthode</th>
                            <th class="px-6 py-4 font-semibold">Statut</th>
                            <th class="px-6 py-4 font-semibold">Infos</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-100 dark:divide-slate-800">
                        <tr th:each="w : ${withdrawals}">
                            <td class="px-6 py-4 text-sm" th:text="${#temporals.format(w.createdAt, 'dd/MM/yyyy HH:mm')}">01/01/2026</td>
                            <td class="px-6 py-4 font-bold" th:text="${#numbers.formatDecimal(w.amount, 1, 2, 'WHITESPACE') + ' $'}">0 $</td>
                            <td class="px-6 py-4 text-sm">
                                <span th:if="${w.method.name() == 'MONCASH'}" class="flex items-center gap-1">
                                    <span class="material-symbols-outlined text-sm">phone_iphone</span> MonCash
                                </span>
                                <span th:if="${w.method.name() == 'BANK_TRANSFER'}" class="flex items-center gap-1">
                                    <span class="material-symbols-outlined text-sm">account_balance</span> Virement
                                </span>
                            </td>
                            <td class="px-6 py-4">
                                <span th:classappend="
                                    ${w.status.name() == 'PENDING'} ? 'bg-amber-100 text-amber-700' :
                                    ${w.status.name() == 'PROCESSING'} ? 'bg-blue-100 text-blue-700' :
                                    ${w.status.name() == 'COMPLETED'} ? 'bg-green-100 text-green-700' :
                                    'bg-red-100 text-red-700'"
                                    class="inline-flex items-center gap-1.5 px-2.5 py-0.5 rounded-full text-xs font-bold">
                                    <span class="size-1.5 rounded-full"
                                          th:classappend="
                                          ${w.status.name() == 'PENDING'} ? 'bg-amber-500' :
                                          ${w.status.name() == 'PROCESSING'} ? 'bg-blue-500' :
                                          ${w.status.name() == 'COMPLETED'} ? 'bg-green-500' :
                                          'bg-red-500'"></span>
                                    <span th:text="${w.status.name() == 'PENDING' ? 'En attente' : 
                                                   w.status.name() == 'PROCESSING' ? 'En cours' :
                                                   w.status.name() == 'COMPLETED' ? 'Payé' : 'Rejeté'}">Statut</span>
                                </span>
                            </td>
                            <td class="px-6 py-4 text-sm text-slate-500">
                                <span th:if="${w.recipientPhone != null}" th:text="${w.recipientPhone}"></span>
                                <span th:if="${w.bankName != null}" th:text="${w.bankName + ' - ' + w.bankAccountNumber}"></span>
                                <span th:if="${w.rejectionReason != null}" class="text-red-500 text-xs block mt-1" th:text="'Raison: ' + ${w.rejectionReason}"></span>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(withdrawals)}">
                            <td colspan="5" class="px-6 py-12 text-center text-slate-400">
                                Aucune demande de retrait pour le moment.
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
