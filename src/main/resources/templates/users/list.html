<!DOCTYPE html><html lang="fr" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Utilisateurs - UnityFund Admin</title><link rel="stylesheet" th:href="@{/css/admin-pro.css}" href="/css/admin-pro.css"></head><body class="admin-body"><div class="mobile-overlay" data-admin-overlay></div><div class="admin-shell"><aside class="admin-sidebar">
  <div class="admin-brand"><span class="admin-logo"></span><span>UnityFund Admin</span></div>
  <nav class="admin-nav">
    <a href="/admin/dashboard">Dashboard</a><a href="/admin/users">Utilisateurs</a><a href="/admin/campaigns">Campagnes</a><a href="/admin/donations">Dons</a><a href="/admin/categories">Catégories</a><a href="/admin/withdrawals">Retraits</a><a href="/admin/reports">Signalements</a><a href="/admin/audit-logs">Audit logs</a><a href="/home">Retour au site</a>
  </nav>
</aside><main class="admin-main"><header class="admin-topbar"><button class="hamburger" type="button" data-admin-menu-toggle>☰</button><div class="admin-title"><h1>Utilisateurs</h1><p>Gestion des comptes et rôles</p></div><div class="page-actions"><a class="btn btn-soft smart-back" href="#" data-fallback="/admin/dashboard">← Retour</a></div></header><section class="admin-content"><div class="admin-card"><div class="admin-card-header"><h2>Liste des utilisateurs</h2></div><div class="table-wrap"><table class="admin-table"><thead><tr><th>ID</th><th>Nom</th><th>Email</th><th>Rôle</th><th>Vérifié</th><th>Actions</th></tr></thead><tbody><tr th:each="u : ${users}"><td th:text="${u.id}">1</td><td th:text="${u.firstName + ' ' + u.lastName}">Nom</td><td th:text="${u.email}">email</td><td><span class="badge" th:text="${u.role}">ROLE_USER</span></td><td><span th:class="${u.emailVerified} ? 'badge badge-ok' : 'badge badge-warn'" th:text="${u.emailVerified} ? 'Oui' : 'Non'">Oui</span></td><td class="actions"><form class="form-inline" th:action="@{/admin/users/{id}/role(id=${u.id})}" method="post"><select name="role"><option value="ROLE_USER">USER</option><option value="ROLE_ADMIN">ADMIN</option></select><button class="btn btn-soft" type="submit">Changer</button></form><form th:if="${!u.emailVerified}" th:action="@{/admin/users/{id}/verify(id=${u.id})}" method="post"><button class="btn btn-primary" type="submit">Vérifier</button></form></td></tr><tr th:if="${#lists.isEmpty(users)}"><td colspan="6" class="empty-state">Aucun utilisateur.</td></tr></tbody></table></div></div></section></main></div><script th:src="@{/js/admin-pro.js}" src="/js/admin-pro.js"></script></body></html>
