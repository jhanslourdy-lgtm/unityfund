<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/fragments/admin-layout :: head('Admin - Catégories')}"></head>
<body><div class="admin-shell"><aside th:replace="~{admin/fragments/admin-layout :: sidebar('categories')}"></aside><main class="main">
<div class="topbar"><div><h2>Catégories de campagnes</h2><p>Créer, modifier et supprimer les catégories utilisées par les campagnes.</p></div></div>
<section class="card" style="margin-bottom:20px"><h3>Ajouter / modifier une catégorie</h3><form class="form-grid" th:action="@{/admin/categories/save}" th:object="${category}" method="post"><input type="hidden" th:field="*{id}"><div class="field"><label>Nom</label><input th:field="*{name}" required></div><div class="field field-full"><label>Description</label><textarea th:field="*{description}" rows="3"></textarea></div><div class="field field-full"><button class="btn btn-primary" type="submit"><i class="fa-solid fa-floppy-disk"></i> Enregistrer</button></div></form></section>
<section class="card table-card"><div class="table-head"><h3>Liste des catégories</h3></div><table><thead><tr><th>ID</th><th>Nom</th><th>Description</th><th>Campagnes</th><th>Actions</th></tr></thead>
<tbody><tr th:each="cat : ${categories}"><td th:text="${cat.id}">1</td><td th:text="${cat.name}">Nom</td><td th:text="${cat.description ?: 'N/A'}">Desc</td><td th:text="${cat.campaigns != null ? cat.campaigns.size() : 0}">0</td><td class="actions"><a class="btn btn-light" th:href="@{/admin/categories/edit/{id}(id=${cat.id})}">Modifier</a><a class="btn btn-danger" th:href="@{/admin/categories/delete/{id}(id=${cat.id})}" onclick="return confirm('Supprimer cette catégorie ?')">Supprimer</a></td></tr></tbody></table></section>
</main></div></body></html>
