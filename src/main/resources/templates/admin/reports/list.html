<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/fragments/admin-layout :: head('Admin - Signalements')}"></head>
<body><div class="admin-shell"><aside th:replace="~{admin/fragments/admin-layout :: sidebar('reports')}"></aside><main class="main">
<div class="topbar"><div><h2>Signalements</h2><p>Analyser les campagnes signalées par les utilisateurs.</p></div></div>
<section class="card table-card"><div class="table-head"><h3>Signalements reçus</h3><input class="search" type="search" placeholder="Rechercher..."></div>
<div class="table-scroll"><table><thead><tr><th>ID</th><th>Campagne</th><th>Reporter</th><th>Raison</th><th>Description</th><th>Statut</th><th>Date</th><th>Actions</th></tr></thead>
<tbody><tr th:each="r : ${reports}"><td th:text="${r.id}">1</td><td th:text="${r.campaign != null ? r.campaign.title : 'N/A'}">Campagne</td><td th:text="${r.reporter != null ? r.reporter.email : 'N/A'}">email</td><td th:text="${r.reason != null ? r.reason.label : 'N/A'}">Fraude</td><td th:text="${r.description ?: 'Aucune description'}">desc</td><td><span class="badge" th:classappend="${r.status}" th:text="${r.status != null ? r.status.label : 'N/A'}">En attente</span></td><td th:text="${r.createdAt}">date</td><td class="actions"><a class="btn btn-warning" th:href="@{/admin/reports/status/{id}/REVIEWED(id=${r.id})}">Examiner</a><a class="btn btn-success" th:href="@{/admin/reports/status/{id}/RESOLVED(id=${r.id})}">Résoudre</a><a class="btn btn-danger" th:href="@{/admin/reports/status/{id}/DISMISSED(id=${r.id})}">Rejeter</a></td></tr></tbody></table></div>
</section></main></div></body></html>
