<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/fragments/admin-layout :: head('Admin - Audit Logs')}"></head>
<body><div class="admin-shell"><aside th:replace="~{admin/fragments/admin-layout :: sidebar('audit')}"></aside><main class="main">
<div class="topbar"><div><h2>Audit des données</h2><p>Historique des actions importantes réalisées sur l'application.</p></div></div>
<section class="card table-card"><div class="table-head"><h3>Journal d'audit</h3><input class="search" type="search" placeholder="Rechercher..."></div>
<div class="table-scroll"><table><thead><tr><th>ID</th><th>Acteur</th><th>Action</th><th>Entité</th><th>ID Entité</th><th>Ancienne valeur</th><th>Nouvelle valeur</th><th>IP</th><th>Date</th></tr></thead>
<tbody><tr th:each="log : ${logs}"><td th:text="${log.id}">1</td><td th:text="${log.actorEmail}">admin@email.com</td><td><span class="badge" th:text="${log.action}">UPDATE</span></td><td th:text="${log.entityName}">Campaign</td><td th:text="${log.entityId}">1</td><td th:text="${log.oldValue ?: 'N/A'}">old</td><td th:text="${log.newValue ?: 'N/A'}">new</td><td th:text="${log.ipAddress ?: 'N/A'}">ip</td><td th:text="${log.createdAt}">date</td></tr></tbody></table></div>
<div class="empty" th:if="${#lists.isEmpty(logs)}">Aucune action enregistrée pour le moment.</div>
</section></main></div></body></html>
