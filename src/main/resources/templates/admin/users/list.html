<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/fragments/admin-layout :: head('Admin - Utilisateurs')}"></head>
<body><div class="admin-shell"><aside th:replace="~{admin/fragments/admin-layout :: sidebar('users')}"></aside><main class="main">
<div class="topbar"><div><h2>Gestion des utilisateurs</h2><p>Modifier les rôles, contrôler les comptes et supprimer les comptes abusifs.</p></div></div>
<section class="card table-card"><div class="table-head"><h3>Liste des utilisateurs</h3><input class="search" type="search" placeholder="Rechercher..."></div>
<div class="table-scroll"><table><thead><tr><th>ID</th><th>Nom complet</th><th>Email</th><th>Téléphone</th><th>Pays</th><th>Vérifié</th><th>Rôle</th><th>Actions</th></tr></thead>
<tbody><tr th:each="u : ${users}"><td th:text="${u.id}">1</td><td th:text="${u.firstName + ' ' + u.lastName}">Nom</td><td th:text="${u.email}">email</td><td th:text="${u.phone ?: 'N/A'}">N/A</td><td th:text="${u.country ?: 'N/A'}">N/A</td><td th:text="${u.emailVerified ? 'Oui' : 'Non'}">Oui</td><td><span class="badge" th:classappend="${u.role}" th:text="${u.role}">ROLE_USER</span></td><td class="actions"><a class="btn btn-success" th:href="@{/admin/users/make-admin/{id}(id=${u.id})}">Admin</a><a class="btn btn-light" th:href="@{/admin/users/make-user/{id}(id=${u.id})}">User</a><a class="btn btn-danger" th:href="@{/admin/users/delete/{id}(id=${u.id})}" onclick="return confirm('Supprimer cet utilisateur ?')">Supprimer</a></td></tr></tbody></table></div>
</section></main></div></body></html>
