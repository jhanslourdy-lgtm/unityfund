<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
:root{--bg:#f5f7fb;--card:#fff;--text:#0f172a;--muted:#64748b;--primary:#2563eb;--primary-dark:#1d4ed8;--border:#e2e8f0;--danger:#dc2626;--success:#16a34a;--warning:#d97706;--shadow:0 18px 45px rgba(15,23,42,.08)}
*{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:Inter,system-ui,-apple-system,Segoe UI,sans-serif;color:var(--text)}a{text-decoration:none;color:inherit}.admin-shell{display:grid;grid-template-columns:280px minmax(0,1fr);min-height:100vh}.sidebar{position:sticky;top:0;height:100vh;background:#071a33;color:#dbeafe;padding:24px 18px;overflow:auto}.brand{display:flex;gap:12px;align-items:center;margin-bottom:28px}.brand-icon{width:42px;height:42px;border-radius:14px;background:var(--primary);display:grid;place-items:center}.brand h1{font-size:20px;margin:0}.brand p{font-size:12px;color:#93c5fd;margin:2px 0 0}.nav{display:grid;gap:8px}.nav a{padding:12px 14px;border-radius:14px;color:#cbd5e1;font-weight:600;display:flex;gap:10px;align-items:center}.nav a:hover,.nav a.active{background:rgba(59,130,246,.18);color:#fff}.main{min-width:0;padding:28px}.topbar{display:flex;justify-content:space-between;gap:16px;align-items:center;margin-bottom:24px}.topbar h2{font-size:28px;margin:0}.topbar p{margin:4px 0 0;color:var(--muted)}.btn{border:0;border-radius:12px;padding:10px 14px;font-weight:700;cursor:pointer;display:inline-flex;gap:8px;align-items:center;white-space:nowrap}.btn-primary{background:var(--primary);color:#fff}.btn-danger{background:#fee2e2;color:var(--danger)}.btn-success{background:#dcfce7;color:var(--success)}.btn-warning{background:#fef3c7;color:var(--warning)}.btn-light{background:#eef2ff;color:var(--primary)}.grid{display:grid;gap:18px}.stats{grid-template-columns:repeat(auto-fit,minmax(180px,1fr));margin-bottom:22px}.card{background:var(--card);border:1px solid var(--border);border-radius:22px;box-shadow:var(--shadow);padding:20px;min-width:0}.stat .icon{width:44px;height:44px;border-radius:15px;background:#e0efff;color:var(--primary);display:grid;place-items:center;margin-bottom:12px}.stat .value{font-size:clamp(22px,4vw,28px);font-weight:800;word-break:break-word}.stat .label{color:var(--muted);font-size:14px}.table-card{overflow:hidden;padding:0}.table-scroll{width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch}.table-head{padding:18px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}.table-head h3{margin:0;font-size:17px}table{width:100%;border-collapse:collapse}th,td{padding:14px 18px;border-bottom:1px solid var(--border);text-align:left;font-size:14px;vertical-align:middle}th{background:#f8fafc;color:#475569;font-size:12px;text-transform:uppercase;letter-spacing:.04em}.badge{display:inline-flex;padding:5px 10px;border-radius:999px;font-size:12px;font-weight:800}.ACTIVE,.ROLE_ADMIN,.COMPLETED,.APPROVED,.SUCCESS,.RESOLVED{background:#dcfce7;color:#166534}.SUSPENDED,.PENDING,.REVIEWED,.PROCESSING{background:#fef3c7;color:#92400e}.DELETED,.REJECTED,.FAILED,.DISMISSED{background:#fee2e2;color:#991b1b}.ROLE_USER{background:#e0f2fe;color:#075985}.actions{display:flex;gap:8px;flex-wrap:wrap}.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.field{display:grid;gap:7px}.field label{font-size:13px;font-weight:700;color:#475569}.field input,.field textarea,.field select{border:1px solid var(--border);border-radius:12px;padding:11px 12px;font:inherit;background:#fff;min-width:0}.field-full{grid-column:1/-1}.filters{display:flex;gap:10px;flex-wrap:wrap}.search{border:1px solid var(--border);border-radius:12px;padding:10px 12px;min-width:260px}.empty{padding:34px;text-align:center;color:var(--muted)}
@media(max-width:980px){.admin-shell{grid-template-columns:1fr}.sidebar{position:relative;height:auto;padding:18px}.nav{grid-template-columns:repeat(2,minmax(0,1fr))}.main{padding:18px}.topbar{align-items:flex-start}.form-grid{grid-template-columns:1fr}table{min-width:780px}.table-card{overflow:hidden}}
@media(max-width:560px){.nav{grid-template-columns:1fr}.main{padding:14px}.topbar{display:block}.topbar h2{font-size:22px}.card{padding:16px;border-radius:18px}.stats{grid-template-columns:1fr}.search{min-width:0;width:100%}.btn{width:100%;justify-content:center}.actions .btn{width:auto}th,td{padding:12px}.brand h1{font-size:18px}}
</style>
</head>
<body>
<aside class="sidebar" th:fragment="sidebar(active)">
    <div class="brand"><div class="brand-icon"><i class="fa-solid fa-shield-halved"></i></div><div><h1>UnityFund</h1><p>Administration</p></div></div>
    <nav class="nav">
        <a th:classappend="${active=='dashboard'} ? 'active'" th:href="@{/admin/dashboard}"><i class="fa-solid fa-chart-line"></i> Tableau de bord</a>
        <a th:classappend="${active=='users'} ? 'active'" th:href="@{/admin/users}"><i class="fa-solid fa-users"></i> Utilisateurs</a>
        <a th:classappend="${active=='campaigns'} ? 'active'" th:href="@{/admin/campaigns}"><i class="fa-solid fa-bullhorn"></i> Campagnes</a>
        <a th:classappend="${active=='donations'} ? 'active'" th:href="@{/admin/donations}"><i class="fa-solid fa-hand-holding-dollar"></i> Dons</a>
        <a th:classappend="${active=='categories'} ? 'active'" th:href="@{/admin/categories}"><i class="fa-solid fa-layer-group"></i> Catégories</a>
        <a th:classappend="${active=='withdrawals'} ? 'active'" th:href="@{/admin/withdrawals}"><i class="fa-solid fa-money-bill-transfer"></i> Retraits</a>
        <a th:classappend="${active=='reports'} ? 'active'" th:href="@{/admin/reports}"><i class="fa-solid fa-triangle-exclamation"></i> Signalements</a>
        <a th:classappend="${active=='audit'} ? 'active'" th:href="@{/admin/audit-logs}"><i class="fa-solid fa-clock-rotate-left"></i> Audit logs</a>
        <a th:href="@{/home}"><i class="fa-solid fa-arrow-left"></i> Retour au site</a>
        <a th:href="@{/logout}"><i class="fa-solid fa-right-from-bracket"></i> Déconnexion</a>
    </nav>
</aside>
</body>
</html>
