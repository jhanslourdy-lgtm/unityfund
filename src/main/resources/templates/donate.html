<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Faire un don | UnityFund</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://js.stripe.com/v3/"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@400&display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#10b77f",
                        "background-light": "#f6f8f7",
                        "background-dark": "#10221c",
                    },
                    fontFamily: { display: ["Inter", "sans-serif"] },
                },
            },
        };
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .amount-btn.selected {
            background-color: #10b77f;
            color: white;
            border-color: #10b77f;
        }
        #card-element {
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 0.5rem;
            background: white;
        }
        .dark #card-element {
            background: #1e293b;
            border-color: #334155;
        }
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #10b77f;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark min-h-screen font-display text-slate-900 dark:text-slate-100">
    
    <div class="max-w-5xl mx-auto px-4 py-8">
        <a th:href="@{/campaign/details/{id}(id=${campaign.id})}" class="inline-flex items-center gap-1 text-sm text-slate-500 hover:text-primary mb-8 transition-colors">
            <span class="material-symbols-outlined text-sm">arrow_back</span>
            Retour à la campagne
        </a>

        <div class="grid lg:grid-cols-5 gap-8">
            <div class="lg:col-span-3">
                <h1 class="text-3xl font-bold mb-2">Faire un don</h1>
                <p class="text-slate-500 mb-8">Soutenez <span th:text="${campaign.user != null} ? ${campaign.user.firstName} : 'ce créateur'" class="font-semibold text-slate-700">le créateur</span>.</p>

                <form id="donation-form" class="bg-white dark:bg-slate-900 rounded-xl shadow-xl border border-slate-100 dark:border-slate-800 p-6 space-y-6">
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-3">Choisissez un montant (USD)</label>
                        <div class="grid grid-cols-3 gap-3 mb-3">
                            <button type="button" onclick="selectAmount(10)" class="amount-btn py-3 rounded-lg border border-slate-200 dark:border-slate-700 font-bold hover:border-primary transition-all bg-white dark:bg-slate-800">10 $</button>
                            <button type="button" onclick="selectAmount(25)" class="amount-btn py-3 rounded-lg border border-slate-200 dark:border-slate-700 font-bold hover:border-primary transition-all bg-white dark:bg-slate-800">25 $</button>
                            <button type="button" onclick="selectAmount(50)" class="amount-btn py-3 rounded-lg border border-slate-200 dark:border-slate-700 font-bold hover:border-primary transition-all bg-white dark:bg-slate-800">50 $</button>
                            <button type="button" onclick="selectAmount(100)" class="amount-btn py-3 rounded-lg border border-slate-200 dark:border-slate-700 font-bold hover:border-primary transition-all bg-white dark:bg-slate-800">100 $</button>
                            <button type="button" onclick="selectAmount(200)" class="amount-btn py-3 rounded-lg border border-slate-200 dark:border-slate-700 font-bold hover:border-primary transition-all bg-white dark:bg-slate-800">200 $</button>
                            <div class="relative">
                                <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm">edit</span>
                                <input type="number" id="custom-amount" oninput="customAmount(this.value)" placeholder="Autre" min="1" step="0.01"
                                       class="w-full pl-9 pr-3 py-3 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 focus:ring-2 focus:ring-primary outline-none font-bold"/>
                            </div>
                        </div>
                        <input type="hidden" id="amount" name="amount"/>
                        <p id="amount-error" class="text-xs text-red-500 hidden">Veuillez sélectionner un montant minimum de 1 $</p>
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5">Message de soutien (optionnel)</label>
                        <textarea id="message" rows="3" class="w-full px-4 py-3 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 focus:ring-2 focus:ring-primary outline-none resize-none" placeholder="Laissez un mot d'encouragement..."></textarea>
                    </div>

                    <div class="flex items-center gap-3">
                        <input type="checkbox" id="anonymous" class="size-4 rounded border-slate-300 text-primary focus:ring-primary"/>
                        <label for="anonymous" class="text-sm text-slate-600 dark:text-slate-400">Faire ce don anonymement</label>
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-3">Méthode de paiement</label>
                        <div class="flex gap-3">
                            <label class="flex-1 cursor-pointer">
                                <input type="radio" name="method" value="STRIPE" checked onchange="toggleMethod('STRIPE')" class="peer hidden"/>
                                <div class="p-4 rounded-lg border-2 border-slate-200 dark:border-slate-700 peer-checked:border-primary peer-checked:bg-primary/5 text-center transition-all h-full">
                                    <span class="material-symbols-outlined text-2xl mb-1 text-slate-400 peer-checked:text-primary">credit_card</span>
                                    <p class="text-sm font-bold text-slate-700 dark:text-slate-200">Carte bancaire</p>
                                </div>
                            </label>
                            <label class="flex-1 cursor-pointer">
                                <input type="radio" name="method" value="MONCASH" onchange="toggleMethod('MONCASH')" class="peer hidden"/>
                                <div class="p-4 rounded-lg border-2 border-slate-200 dark:border-slate-700 peer-checked:border-primary peer-checked:bg-primary/5 text-center transition-all h-full flex flex-col items-center justify-center">
                                    <img th:src="@{/images/cash.png}" alt="Pay with MonCash" class="h-8 object-contain mb-1">
                                    <p class="text-xs text-slate-400">Digicel Haïti</p>
                                </div>
                            </label>
                        </div>
                    </div>

                    <div id="stripe-section">
                        <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5">Informations de carte</label>
                        <div id="card-element" class="dark:bg-slate-800 dark:border-slate-700"></div>
                        <div id="card-errors" class="text-xs text-red-500 mt-2"></div>
                    </div>

                    <div id="moncash-section" class="hidden p-4 bg-amber-50 dark:bg-amber-900/20 rounded-lg border border-amber-200 dark:border-amber-800">
                        <div class="flex items-start gap-3">
                            <span class="material-symbols-outlined text-amber-600 dark:text-amber-400">info</span>
                            <p class="text-xs text-amber-700 dark:text-amber-300">Vous serez redirigé vers l'interface sécurisée de MonCash pour finaliser la transaction.</p>
                        </div>
                    </div>

                    <div id="global-error" class="hidden p-3 bg-red-100 border border-red-400 text-red-700 rounded-lg text-sm"></div>

                    <button type="submit" id="submit-btn" class="w-full py-4 bg-primary hover:bg-primary/90 text-white font-bold rounded-xl transition-all shadow-lg flex items-center justify-center gap-2 disabled:opacity-50">
                        <span id="btn-text">Confirmer le don</span>
                        <span id="btn-spinner" class="spinner hidden"></span>
                    </button>
                </form>
            </div>

            <div class="lg:col-span-2">
                <div class="sticky top-8 bg-white dark:bg-slate-900 rounded-xl shadow-xl border border-slate-100 dark:border-slate-800 p-6">
                    <div class="aspect-video rounded-lg overflow-hidden mb-4 bg-slate-200">
                        <img th:if="${campaign.imageUrl != null}" th:src="${campaign.imageUrl}" class="w-full h-full object-cover"/>
                    </div>
                    <h3 th:text="${campaign.title}" class="font-bold text-lg mb-2">Titre</h3>
                    <div class="border-t border-slate-100 dark:border-slate-800 pt-4">
                        <div class="flex justify-between text-sm font-semibold">
                            <span>Votre don</span>
                            <span id="summary-amount" class="text-primary">0 $</span>
                        </div>
                        <div class="flex justify-between text-sm font-bold mt-2 pt-2 border-t border-slate-100 dark:border-slate-800">
                            <span>Total à payer</span>
                            <span id="summary-total" class="text-slate-900 dark:text-white">0 $</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        const campaignId = [[${campaign.id}]];
        const stripePublicKey = [[${stripePublicKey}]];
        
        const stripe = Stripe(stripePublicKey);
        const elements = stripe.elements();
        const cardElement = elements.create('card');
        cardElement.mount('#card-element');

        let selectedAmountValue = 0;

        function selectAmount(amount) {
            selectedAmountValue = amount;
            document.getElementById('amount').value = amount;
            document.getElementById('custom-amount').value = '';
            document.querySelectorAll('.amount-btn').forEach(btn => btn.classList.remove('selected'));
            event.target.classList.add('selected');
            updateSummary();
        }

        function customAmount(value) {
            selectedAmountValue = parseFloat(value) || 0;
            document.getElementById('amount').value = selectedAmountValue;
            document.querySelectorAll('.amount-btn').forEach(btn => btn.classList.remove('selected'));
            updateSummary();
        }

        function updateSummary() {
            document.getElementById('summary-amount').textContent = selectedAmountValue.toFixed(2) + ' $';
            document.getElementById('summary-total').textContent = selectedAmountValue.toFixed(2) + ' $';
        }

        function toggleMethod(method) {
            document.getElementById('stripe-section').classList.toggle('hidden', method !== 'STRIPE');
            document.getElementById('moncash-section').classList.toggle('hidden', method !== 'MONCASH');
        }

        document.getElementById('donation-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const method = document.querySelector('input[name="method"]:checked').value;
            const amount = parseFloat(document.getElementById('amount').value);
            
            if (!amount || amount < 1) {
                document.getElementById('amount-error').classList.remove('hidden');
                return;
            }

            const submitBtn = document.getElementById('submit-btn');
            submitBtn.disabled = true;
            document.getElementById('btn-spinner').classList.remove('hidden');

            try {
                const response = await fetch('/api/payments/create-intent', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        campaignId: campaignId,
                        amount: amount,
                        method: method,
                        message: document.getElementById('message').value,
                        anonymous: document.getElementById('anonymous').checked
                    })
                });

                const data = await response.json();

                if (method === 'STRIPE') {
                    const { paymentIntent, error } = await stripe.confirmCardPayment(data.clientSecret, {
                        payment_method: { card: cardElement }
                    });
                    if (paymentIntent.status === 'succeeded') {
                        window.location.href = '/donation/success?transactionId=' + data.transactionId;
                    }
                } else if (method === 'MONCASH') {
                    // CORRECTION DE L'URL SANDBOX ICI
                    const paymentToken = data.clientSecret;
                    if (paymentToken) {
                        window.location.href = `https://sandbox.moncashbutton.digicelgroup.com/Moncash-middleware/Payment/Token?paymentToken=${paymentToken}`;
                    }
                }
            } catch (err) {
                document.getElementById('global-error').textContent = "Erreur de traitement";
                document.getElementById('global-error').classList.remove('hidden');
                submitBtn.disabled = false;
                document.getElementById('btn-spinner').classList.add('hidden');
            }
        });
    </script>
</body>
</html>
