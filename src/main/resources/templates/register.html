<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>UnityFund - Inscription</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#10b77f",
                        "background-light": "#f6f8f7",
                        "background-dark": "#10221c",
                    },
                    fontFamily: { "display": ["Inter"] },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .form-scrollbar::-webkit-scrollbar { width: 6px; }
        .form-scrollbar::-webkit-scrollbar-thumb { background: #dbe6e2; border-radius: 10px; }
    </style>
    <link rel="stylesheet" th:href="@{/css/ux-global.css}" href="/css/ux-global.css">
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100">
<div class="flex min-h-screen">
    <div class="hidden lg:flex lg:w-1/2 relative overflow-hidden bg-primary">
        <div class="absolute inset-0 z-0">
            <img alt="Community support" class="w-full h-full object-cover opacity-60" src="https://images.unsplash.com/photo-1559027615-cd9d7a93434c?q=80&w=2070&auto=format&fit=crop"/>
            <div class="absolute inset-0 bg-gradient-to-t from-primary/80 to-transparent"></div>
        </div>
        <div class="relative z-10 flex flex-col justify-center px-16 xl:px-24">
            <div class="flex items-center gap-3 mb-12">
                <div class="size-10 text-white">
                    <svg fill="none" viewBox="0 0 48 48"><path d="M36.7273 44C33.9891 44 31.6043 39.8386 30.3636 33.69C29.123 39.8386 26.7382 44 24 44C21.2618 44 18.877 39.8386 17.6364 33.69C16.3957 39.8386 14.0109 44 11.2727 44C7.25611 44 4 35.0457 4 24C4 12.9543 7.25611 4 11.2727 4C14.0109 4 16.3957 8.16144 17.6364 14.31C18.877 8.16144 21.2618 4 24 4C26.7382 4 29.123 8.16144 30.3636 14.31C31.6043 8.16144 33.9891 4 36.7273 4C40.7439 4 44 12.9543 44 24C44 35.0457 40.7439 44 36.7273 44Z" fill="currentColor"></path></svg>
                </div>
                <span class="text-2xl font-bold text-white tracking-tight">UnityFund</span>
            </div>
            <h1 class="text-5xl font-extrabold text-white leading-[1.1] mb-6">Rejoignez une communauté de <br/>créateurs de changement</h1>
            <p class="text-white/90 text-lg max-w-md leading-relaxed">Donnez vie à vos initiatives, connectez-vous avec des donateurs et suivez votre impact en temps réel.</p>
        </div>
    </div>

    <div class="w-full lg:w-1/2 flex flex-col justify-center items-center p-6 sm:p-12 lg:p-16 xl:p-24 overflow-y-auto form-scrollbar">
        <div class="w-full max-w-[520px]">
            <div class="mb-10">
                <h2 class="text-3xl font-bold text-slate-900 dark:text-slate-100 mb-2">Créer un compte</h2>
                <p class="text-slate-600 dark:text-slate-400">Rejoignez des milliers d'organisations qui font la différence.</p>
            </div>

            <form th:action="@{/register}" th:object="${user}" method="POST" class="space-y-6">
                <div class="flex flex-col sm:flex-row gap-4">
                    <div class="flex-1">
                        <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5" for="first-name">Prénom</label>
                        <input th:field="*{firstName}" class="w-full px-4 py-3 rounded-lg border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all" id="first-name" placeholder="Jean" type="text" required/>
                    </div>
                    <div class="flex-1">
                        <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5" for="last-name">Nom</label>
                        <input th:field="*{lastName}" class="w-full px-4 py-3 rounded-lg border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all" id="last-name" placeholder="Dupont" type="text" required/>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5" for="email">Adresse Email</label>
                    <input th:field="*{email}" class="w-full px-4 py-3 rounded-lg border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all" id="email" placeholder="exemple@unityfund.org" type="email" required/>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5" for="password">Mot de passe</label>
                    <div class="relative">
                        <input th:field="*{password}" class="w-full px-4 py-3 rounded-lg border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all" id="password" placeholder="••••••••" type="password" required/>
                    </div>
                </div>

                <div class="flex items-start gap-3">
                    <input class="size-4 rounded border-slate-300 text-primary focus:ring-primary" id="terms" type="checkbox" required/>
                    <label class="text-sm text-slate-600 dark:text-slate-400" for="terms">
                        J'accepte les <a class="text-primary font-semibold hover:underline" href="#">Conditions d'utilisation</a>.
                    </label>
                </div>

                <button class="w-full py-4 bg-primary hover:bg-primary/90 text-white font-bold rounded-lg transition-all shadow-lg shadow-primary/20 text-base" type="submit">
                    Créer mon compte
                </button>

                <div class="text-center pt-4">
                    <p class="text-slate-600 dark:text-slate-400">
                        Déjà un compte ? <a class="text-primary font-bold hover:underline ml-1" th:href="@{/login}">Connexion</a>
                    </p>
                </div>
            </form>
        </div>
    </div>
</div>
<script th:src="@{/js/ux-global.js}" src="/js/ux-global.js"></script>
</body>
</html>
