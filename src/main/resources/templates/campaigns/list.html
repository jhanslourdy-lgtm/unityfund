<!DOCTYPE html><html lang="fr" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Campagnes - UnityFund Admin</title><link rel="stylesheet" th:href="@{/css/admin-pro.css}" href="/css/admin-pro.css"></head><body class="admin-body"><div class="mobile-overlay" data-admin-overlay></div><div class="admin-shell"><aside class="admin-sidebar">
  <div class="admin-brand"><span class="admin-logo"></span><span>UnityFund Admin</span></div>
  <nav class="admin-nav">
    <a href="/admin/dashboard">Dashboard</a><a href="/admin/users">Utilisateurs</a><a href="/admin/campaigns">Campagnes</a><a href="/admin/donations">Dons</a><a href="/admin/categories">Catégories</a><a href="/admin/withdrawals">Retraits</a><a href="/admin/reports">Signalements</a><a href="/admin/audit-logs">Audit logs</a><a href="/home">Retour au site</a>
  </nav>
</aside><main class="admin-main"><header class="admin-topbar"><button class="hamburger" type="button" data-admin-menu-toggle>☰</button><div class="admin-title"><h1>Campagnes</h1><p>Contrôle des campagnes</p></div><div class="page-actions"><a class="btn btn-soft smart-back" href="#" data-fallback="/admin/dashboard">← Retour</a></div></header><section class="admin-content"><div class="admin-card"><div class="admin-card-header"><h2>Campagnes</h2></div><div class="table-wrap"><table class="admin-table"><thead><tr><th>ID</th><th>Titre</th><th>Objectif</th><th>Collecté</th><th>Statut</th><th>Action</th></tr></thead><tbody><tr th:each="c : ${campaigns}"><td th:text="${c.id}">1</td><td class="truncate" th:text="${c.title}">Titre</td><td th:text="${c.goalAmount}">0</td><td th:text="${c.currentAmount}">0</td><td><span class="badge" th:text="${c.status}">ACTIVE</span></td><td><form class="form-inline" th:action="@{/admin/campaigns/{id}/status(id=${c.id})}" method="post"><select name="status"><option th:each="s:${statuses}" th:value="${s}" th:text="${s}"></option></select><button class="btn btn-soft" type="submit">Mettre à jour</button></form></td></tr><tr th:if="${#lists.isEmpty(campaigns)}"><td colspan="6" class="empty-state">Aucune campagne.</td></tr></tbody></table></div></div></section></main></div><script th:src="@{/js/admin-pro.js}" src="/js/admin-pro.js"></script></body></html>
